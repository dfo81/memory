<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV Draw</title>
  </head>
  <body>
    <section id="game_over" class="screen is-active" data-theme="foods">
      <h1 class="game-over__title">GAME OVER</h1>
      <div class="final">
        <p class="game-over__label">Final score</p>
        <div class="game-over__scores">
          <div class="game-over__score blue">
            <img src="/src/assets/icons/general/label_blue.svg" alt="" />
            <span>Blue</span>
            <span id="final-score-blue">0</span>
          </div>
          <div class="game-over__score orange">
            <img src="/src/assets/icons/general/label_orange.svg" alt="" />
            <span>Orange</span>
            <span id="final-score-orange">0</span>
          </div>
        </div>
      </div>
    </section>
  </body>
  <script type="module">
    import "./src/styles/style.scss";
  </script>
</html>
