<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foods theme — design</title>
    <script type="module">
      import "./src/styles/themes/_foods.scss";
    </script>
  </head>
  <body>
    <section>
      <header>
        <div class="players">
          <div class="orange">
            <img src="/src/assets/icons/foods_theme/chess_pawn_orange.svg" alt="" />
            <span>0</span>
          </div>
          <div class="blue">
            <img src="/src/assets/icons/foods_theme/chess_pawn_blue.svg" alt="" />
            <span>0</span>
          </div>
        </div>
        <div class="current-player">
          <span>Current player:</span>
          <img src="/src/assets/icons/foods_theme/chess_pawn.svg" alt="" />
        </div>
        <div class="exit">
          <img src="/src/assets/icons/foods_theme/exit.svg" alt="" />
          <img class="hover hidden" src="/src/assets/icons/foods_theme/exit_hover.svg" alt="" />
        </div>
      </header>

      <div class="field">
        <div class="card back">
          <img src="/src/assets/icons/foods_theme/back_logo.svg" alt="" />
        </div>
        <div class="card front">
          <img src="/src/assets/icons/foods_theme/Artboard 6@3x 1.svg" alt="" />
        </div>
        <div class="card front">
          <img src="/src/assets/icons/foods_theme/orange_cover.svg" alt="" />
          <img src="/src/assets/icons/foods_theme/01 copy@3x 1.svg" alt="" />
        </div>
        <div class="card front">
          <img src="/src/assets/icons/foods_theme/orange_cover.svg" alt="" />
          <img src="/src/assets/icons/foods_theme/01 copy@3x 1.svg" alt="" />
        </div>
      </div>
    </section>
    <div class="overlay">
      <span>Are you sure you want to<br />quit the game?</span>
      <div class="buttons">
        <div class="no_button">
          <img src="src/assets/icons/foods_theme/Property 1=Default.svg" />
          <img class="hover" src="src/assets/icons/foods_theme/Property_1_hover.svg" alt="" />
        </div>
        <div class="exit">
          <img src="/src/assets/icons/foods_theme/exit.svg" alt="" />
          <img class="hover hidden" src="/src/assets/icons/foods_theme/exit_hover.svg" alt="" />
        </div>
      </div>
    </div>
  </body>
</html>
