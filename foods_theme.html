<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foods theme — design</title>
    <script type="module">
      import './src/styles/themes/_foods.scss'
    </script>
</head>
<body>
    <section>
        <header>
            <div class="players">
                <div class="orange">
                    <img src="/src/assets/icons/foods_theme/chess_pawn_orange.svg" alt="">
                    <span>0</span>
                </div>
                <div class="blue">
                    <img src="/src/assets/icons/foods_theme/chess_pawn_blue.svg" alt="">
                    <span>0</span>
                </div>
            </div>
            <div class="current-player">
                <span>Current player:</span>
                <img src="/src/assets/icons/foods_theme/chess_pawn.svg" alt="">
            </div>
            <div class="exit">
                <img src="/src/assets/icons/foods_theme/Property 1=Default.svg" alt="">
                <div></div>
            </div>
        </header>
    </section>
</body>
</html>
