<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TS-Memory</title>
  </head>
  <body>
    <!-- Welcome screen -->
    <section id="welcome" class="screen">
      <img class="controller" src="/src/assets/icons/general/stadia_controller.svg" alt="" />
      <div class="title">
        <h4>It´s play time.</h4>
        <h1>Ready to play?</h1>
      </div>
      <div id="play-button">
        <img class="icon-controller" src="/src/assets/icons/general/controller.svg" alt="" />
        <span>Play</span>
        <span class="icon-arrow"></span>
      </div>
    </section>

    <!-- Settings screen -->
    <section id="settings" class="screen">
      <div class="settings__outer">
        <h2>Settings</h2>
        <img src="/src/assets/icons/general/Line_left.svg" alt="" class="settings__line" />

        <div class="settings__box">
          <div class="settings__content">
            <div class="settings__left">
              <div class="settings__group">
                <div class="settings__group-header">
                  <img src="/src/assets/icons/general/palette.svg" alt="" />
                  <h3>Game themes</h3>
                </div>
                <div class="settings__options">
                  <label class="radio-option">
                    <input type="radio" name="theme" value="code-vibes" checked />
                    <span class="radio-icon"></span>
                    <span class="radio-label">Code vibes theme</span>
                    <img class="option-indicator" src="/src/assets/icons/general/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="theme" value="gaming" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">Gaming theme</span>
                    <img class="option-indicator" src="/src/assets/icons/general/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="theme" value="da-projects" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">DA Projects theme</span>
                    <img class="option-indicator" src="/src/assets/icons/general/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="theme" value="foods" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">Foods theme</span>
                    <img class="option-indicator" src="/src/assets/icons/general/Line_right.svg" alt="" />
                  </label>
                </div>
              </div>

              <div class="settings__group">
                <div class="settings__group-header">
                  <img src="/src/assets/icons/general/chess_pawn.svg" alt="" />
                  <h3>Choose player</h3>
                </div>
                <div class="settings__options">
                  <label class="radio-option">
                    <input type="radio" name="player" value="blue" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">Blue</span>
                    <img class="option-indicator" src="/src/assets/icons/general/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="player" value="orange" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">Orange</span>
                    <img class="option-indicator" src="/src/assets/icons/general/Line_right.svg" alt="" />
                  </label>
                </div>
              </div>

              <div class="settings__group">
                <div class="settings__group-header">
                  <img src="/src/assets/icons/general/style.svg" alt="" />
                  <h3>Board size</h3>
                </div>
                <div class="settings__options">
                  <label class="radio-option">
                    <input type="radio" name="size" value="16" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">16 cards</span>
                    <img class="option-indicator" src="/src/assets/icons/general/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="size" value="24" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">24 cards</span>
                    <img class="option-indicator" src="/src/assets/icons/general/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="size" value="36" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">36 cards</span>
                    <img class="option-indicator" src="/src/assets/icons/general/Line_right.svg" alt="" />
                  </label>
                </div>
              </div>
            </div>

            <div class="settings__right">
              <img id="theme-preview" src="/src/assets/icons/general/theme_code-vibes.svg" alt="Theme preview" />
              <div class="settings__footer">
                <div class="settings__breadcrumb">
                  <span>Game theme</span>
                  <img id="line-v-1" src="/src/assets/icons/general/Line_vertikal_default.svg" alt="" />
                  <span id="breadcrumb-player">Player</span>
                  <img id="line-v-2" src="/src/assets/icons/general/Line_vertikal_default.svg" alt="" />
                  <span id="breadcrumb-size">Board size</span>
                </div>
                <button id="start-game" class="settings__start" disabled>
                  <img src="/src/assets/icons/general/play_frame.svg" alt="" />
                  <span>Start</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Game screen -->
    <section id="field" class="screen">
      <header>
        <div class="labels">
          <div class="label blue">
            <img src="/src/assets/icons/general/label_blue.svg" alt="" />
            <span>Blue</span>
            <span class="score">0</span>
          </div>
          <div class="label orange">
            <img src="/src/assets/icons/general/label_orange.svg" alt="" />
            <span>Orange</span>
            <span class="score">0</span>
          </div>
        </div>
        <div class="current-player">
          <span>Current player:</span>
          <img id="current-player-icon" src="src/assets/icons/general/label_blue.svg" alt="" />
        </div>
        <div class="exit">
          <img src="/src/assets/icons/general/exit_icon.svg" alt="" />
          <span>Exit game</span>
        </div>
      </header>
      <div id="card-grid" class="card-grid">
        <!-- template -->
      </div>
    </section>

    <!-- Exit overlay (bottom sheet) -->
    <div id="exit-overlay" class="exit-overlay">
      <div class="exit-overlay__backdrop"></div>
      <div class="exit-overlay__sheet">
        <h2 class="exit-overlay__title">Are you sure you want to <br> quit the game?</h2>
        <div class="exit-overlay__actions">
          <button id="exit-cancel">Back to game</button>
          <button id="exit-confirm">Exit game</button>
        </div>
      </div>
    </div>

    <!-- Result screen (winner or draw) -->
    <section id="result" class="screen">
      <img class="result__confetti" id="result-confetti" src="/src/assets/icons/general/Confetti.svg" alt="" />
      <div class="result__body">
        <div class="result__text">
          <p class="result__subtitle" id="result-subtitle">The winner is</p>
          <h2 class="result__title" id="result-title">ORANGE PLAYER</h2>
          <img class="result__icon" id="result-icon" src="/src/assets/icons/general/Player_orange.svg" alt="" />
        </div>
        <button class="result__btn" id="back-to-start">Back to start</button>
      </div>
    </section>

    <!-- Game over screen -->
    <section id="game_over" class="screen">
      <h1 class="game-over__title">GAME OVER</h1>
      <p class="game-over__label">Final score</p>
      <div class="game-over__scores">
        <div class="game-over__score blue">
          <img src="/src/assets/icons/general/label_blue.svg" alt="" />
          <span>Blue</span>
          <span id="final-score-blue">0</span>
        </div>
        <div class="game-over__score orange">
          <img src="/src/assets/icons/general/label_orange.svg" alt="" />
          <span>Orange</span>
          <span id="final-score-orange">0</span>
        </div>
      </div>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
