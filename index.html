<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TS-Memory</title>
  </head>
  <body>
    <!-- Welcome screen -->
    <section id="welcome" class="screen">
      <img class="controller" src="/src/assets/icons/stadia_controller.svg" alt="" />
      <div class="title">
        <h4>It´s play time.</h4>
        <h1>Ready to play?</h1>
      </div>
      <div id="play-button">
        <img class="icon-controller" src="/src/assets/icons/controller.svg" alt="" />
        <span>Play</span>
        <span class="icon-arrow"></span>
      </div>
    </section>

    <!-- Settings screen -->
    <section id="settings" class="screen">
      <div class="settings__outer">
        <h2>Settings</h2>
        <img src="/src/assets/icons/Line_left.svg" alt="" class="settings__line" />

        <div class="settings__box">
          <div class="settings__content">
            <div class="settings__left">
              <div class="settings__group">
                <div class="settings__group-header">
                  <img src="/src/assets/icons/palette.svg" alt="" />
                  <h3>Game themes</h3>
                </div>
                <div class="settings__options">
                  <label class="radio-option">
                    <input type="radio" name="theme" value="it-logos" checked />
                    <span class="radio-icon"></span>
                    <span class="radio-label">Code vibes theme</span>
                    <img class="option-indicator" src="/src/assets/icons/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="theme" value="gaming" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">Gaming theme</span>
                    <img class="option-indicator" src="/src/assets/icons/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="theme" value="da-projects" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">DA Projects theme</span>
                    <img class="option-indicator" src="/src/assets/icons/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="theme" value="foods" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">Foods theme</span>
                    <img class="option-indicator" src="/src/assets/icons/Line_right.svg" alt="" />
                  </label>
                </div>
              </div>

              <div class="settings__group">
                <div class="settings__group-header">
                  <img src="/src/assets/icons/chess_pawn.svg" alt="" />
                  <h3>Choose player</h3>
                </div>
                <div class="settings__options">
                  <label class="radio-option">
                    <input type="radio" name="player" value="blue" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">Blue</span>
                    <img class="option-indicator" src="/src/assets/icons/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="player" value="orange" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">Orange</span>
                    <img class="option-indicator" src="/src/assets/icons/Line_right.svg" alt="" />
                  </label>
                </div>
              </div>

              <div class="settings__group">
                <div class="settings__group-header">
                  <img src="/src/assets/icons/style.svg" alt="" />
                  <h3>Board size</h3>
                </div>
                <div class="settings__options">
                  <label class="radio-option">
                    <input type="radio" name="size" value="16" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">16 cards</span>
                    <img class="option-indicator" src="/src/assets/icons/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="size" value="24" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">24 cards</span>
                    <img class="option-indicator" src="/src/assets/icons/Line_right.svg" alt="" />
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="size" value="36" />
                    <span class="radio-icon"></span>
                    <span class="radio-label">36 cards</span>
                    <img class="option-indicator" src="/src/assets/icons/Line_right.svg" alt="" />
                  </label>
                </div>
              </div>
            </div>

            <div class="settings__right">
              <img id="theme-preview" src="/src/assets/icons/theme=IT logos.svg" alt="Theme preview" />
              <div class="settings__footer">
                <div class="settings__breadcrumb">
                  <span>Game theme</span>
                  <img id="line-v-1" src="/src/assets/icons/Line_vertikal_default.svg" alt="" />
                  <span id="breadcrumb-player">Player</span>
                  <img id="line-v-2" src="/src/assets/icons/Line_vertikal_default.svg" alt="" />
                  <span id="breadcrumb-size">Board size</span>
                </div>
                <button id="start-game" class="settings__start" disabled>
                  <img src="/src/assets/icons/play_frame.svg" alt="" />
                  <span>Start</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Game screen -->
    <section id="field" class="screen">
      <header>
        <div class="labels">
          <div class="label blue">
            <img src="/src/assets/icons/label_blue.svg" alt="" />
            <span>Blue</span>
            <span class="score">0</span>
          </div>
          <div class="label orange">
            <img src="/src/assets/icons/label_orange.svg" alt="" />
            <span>Orange</span>
            <span class="score">0</span>
          </div>
        </div>
        <div class="current-player">
          <span>Current player:</span>
          <img id="current-player-icon" src="src/assets/icons/label_blue.svg" alt="">
        </div>
        <div class="exit">
          <img src="/src/assets/icons/exit_icon.svg" alt="">
          <span>Exit game</span>
        </div>
      </header>
      <div id="card-grid" class="card-grid"></div>

      <div id="exit-overlay" class="exit-overlay" hidden>
        <div class="exit-overlay__backdrop"></div>
        <div class="exit-overlay__card">
          <h2>Exit game?</h2>
          <p>Your progress will be lost.</p>
          <div class="exit-overlay__actions">
            <button id="exit-cancel">Cancel</button>
            <button id="exit-confirm">Exit</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Game over screen -->
    <section id="game_over" class="screen">
      <div class="game-over__backdrop"></div>
      <div class="game-over__card">
        <h1>Game over</h1>
        <div class="game-over__scores">
          <div class="game-over__score blue">
            <img src="/src/assets/icons/label_blue.svg" alt="" />
            <span>Blue</span>
            <span id="final-score-blue">0</span>
          </div>
          <div class="game-over__score orange">
            <img src="/src/assets/icons/label_orange.svg" alt="" />
            <span>Orange</span>
            <span id="final-score-orange">0</span>
          </div>
        </div>
        <p id="game-over-winner"></p>
        <button id="play-again">Play again</button>
      </div>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
