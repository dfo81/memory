<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DA Projects — Field</title>
    <!-- Design-Prototyp: über den Vite-Dev-Server öffnen (npm run dev → /da_field.html).
         Echte App-Struktur + style.scss → was du in _da-projects.scss unter
         [data-theme="da-projects"] schreibst, erscheint hier sofort und später 1:1 in der App.
         Karten-Bilder sind code_vibes-Platzhalter, bis dein da_projects_theme/ gefüllt ist. -->
    <script type="module">
      import "./src/styles/style.scss";
    </script>
  </head>
  <body>
    <section id="field" class="screen is-active" data-theme="da-projects">
      <header>
        <div class="labels">
          <div class="label blue">
            <img src="/src/assets/icons/general/label_blue.svg" alt="" />
            <span>Blue</span>
            <span class="score">2</span>
          </div>
          <div class="label orange">
            <img src="/src/assets/icons/general/label_orange.svg" alt="" />
            <span>Orange</span>
            <span class="score">1</span>
          </div>
        </div>
        <div class="current-player">
          <span>Current player:</span>
          <img id="current-player-icon" src="/src/assets/icons/general/label_blue.svg" alt="" />
        </div>
        <div class="exit">
          <img src="/src/assets/icons/general/exit_icon.svg" alt="" />
          <span>Exit game</span>
        </div>
      </header>

      <div id="card-grid" class="card-grid" data-theme="da-projects" style="grid-template-columns: repeat(4, 1fr)">
        <!-- matched (front, matched-Style) -->
        <button class="card is-matched">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/react.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>
        <!-- face-down (back) -->
        <button class="card">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/vue.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>
        <!-- flipped (front) -->
        <button class="card is-flipped">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/python.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>
        <button class="card">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/javascript.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>

        <button class="card">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/typescript.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>
        <button class="card is-matched">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/sass.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>
        <button class="card">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/git.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>
        <button class="card is-flipped">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/html.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>

        <button class="card">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/css.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>
        <button class="card">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/github.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>
        <button class="card is-matched">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/nodejs.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>
        <button class="card">
          <div class="card__inner">
            <div class="card__face"><img src="/src/assets/icons/code_vibes_theme/cards/django.svg" alt="" /></div>
            <div class="card__face card__face--back"><img src="/src/assets/icons/code_vibes_theme/back.svg" alt="" /></div>
          </div>
        </button>
      </div>
    </section>
  </body>
</html>
